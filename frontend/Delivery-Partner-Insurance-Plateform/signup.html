<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container page-shell compact-shell">
    <span class="eyebrow">Step 1</span>
    <h2>Delivery Partner Signup</h2>
    <p class="subtext">Create a partner profile for the prototype. These details personalize the dashboard and activity timeline.</p>

    <div class="card form-card">
      <input id="name" placeholder="Partner name">
      <input id="phone" placeholder="Phone number">
      <select id="platform">
        <option>Swiggy</option>
        <option>Zomato</option>
        <option>Blinkit</option>
      </select>
      <div class="hero-actions form-actions">
        <button onclick="saveUser()">Continue to Plan</button>
        <button class="secondary" onclick="fillDemoProfile()">Use Demo Profile</button>
      </div>
      <p id="signupError" class="feedback"></p>
    </div>
  </div>

  <script src="demo-data.js"></script>
  <script src="main.js"></script>
</body>
</html>
