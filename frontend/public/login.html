<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Authenticate | GigHedge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container page-shell compact-shell">
    <span class="eyebrow">Authentication</span>
    <h2>Oracle Access Authentication</h2>
    <p class="subtext">Verify node credentials to resume your algorithmically hedged liquidity contract.</p>

    <div class="card form-card">
      <input id="loginPhone" placeholder="Node ID (Phone)">
      <input type="password" id="loginPassword" placeholder="Passkey">
      <div class="hero-actions form-actions">
        <button onclick="loginUser()">Verify Node Integrity</button>
        <button class="secondary" onclick="fillDemoLogin()">Use Pre-Seeded Demo Node</button>
      </div>
      <div class="hero-actions form-actions" style="margin-top: 12px;">
        <button class="secondary" style="border: none; color: #64748b;" onclick="location.href='signup.html'">No Node? Establish Link</button>
      </div>
      <p id="loginError" class="feedback"></p>
    </div>
  </div>

  <script src="demo-data.js?v=2"></script>
  <script src="main.js?v=2"></script>
</body>
</html>
