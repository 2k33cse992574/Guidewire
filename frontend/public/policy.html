<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Risk Option</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container page-shell compact-shell">
    <span class="eyebrow">Step 2</span>
    <h2>Select Micro-Hedge Contract</h2>
    <p class="subtext">Choose the weekly option cost and liquidity limit that best insulates the delivery partner's unit-economics.</p>

    <div class="plan-grid">
      <div class="card plan-card">
        <span class="plan-badge">Starter Hedge</span>
        <h3>Rs 49/week</h3>
        <p>Liquidity Rs 1000</p>
        <button onclick="selectPlan(49, 1000)">Choose Starter</button>
      </div>

      <div class="card plan-card featured-plan">
        <span class="plan-badge">Optimal Volatility Cover</span>
        <h3>Rs 99/week</h3>
        <p>Liquidity Rs 2500</p>
        <button onclick="selectPlan(99, 2500)">Choose Optimal</button>
      </div>

      <div class="card plan-card">
        <span class="plan-badge">Max Hedge</span>
        <h3>Rs 199/week</h3>
        <p>Liquidity Rs 5000</p>
        <button onclick="selectPlan(199, 5000)">Choose Max</button>
      </div>
    </div>
  </div>

  <script src="demo-data.js?v=2"></script>
  <script src="main.js?v=2"></script>
</body>
</html>
